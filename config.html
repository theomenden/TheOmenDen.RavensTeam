<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raven's Team — Configuration</title>
    <!-- Twitch Extension Helper: required, must load from the Twitch CDN (allowed by CSP). -->
    <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: 'Segoe UI', system-ui, sans-serif;
        color: #efeef1;
        background: #18181b;
      }
      h1 { margin: 0 0 8px; font-size: 20px; }
      p { margin: 0; max-width: 44ch; line-height: 1.5; color: #adadb8; }
    </style>
  </head>
  <body>
    <!-- No settings: the panel derives everything from the channel's Helix teams. -->
    <main>
      <h1>Raven's Team</h1>
      <p>
        Nothing to configure — this panel automatically shows the teams your channel
        belongs to and which members are currently live.
      </p>
    </main>
  </body>
</html>
