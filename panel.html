<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raven's Team</title>
    <!-- Reset the UA 8px body margin and pin every wrapper to the iframe box so nothing
         overflows the 318×496 panel — kills the panel's horizontal + vertical scrollbars.
         The roster owns the only scroll (inside MemberList). -->
    <style>
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; overflow: hidden; }
      /* Reduced-motion "nuke", toggled by App via the html data-reduced-motion attribute.
         Neutralizes every animation/transition when the viewer opts in — parallel to the OS
         @media (prefers-reduced-motion) guards the components already ship. */
      [data-reduced-motion="true"] *,
      [data-reduced-motion="true"] *::before,
      [data-reduced-motion="true"] *::after {
        animation-duration: 0.01ms !important;
        animation-delay: 0s !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    </style>
    <!-- Twitch Extension Helper: required, must load from the Twitch CDN (allowed by CSP). -->
    <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
